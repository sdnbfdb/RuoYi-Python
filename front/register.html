<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创建账户</title>
<link href="https://static.mastergo.com/static/ai/resource/html/googleapis/css2" rel="stylesheet">
<script src="https://static.mastergo.com/static/ai/resource/html/tailwind/tailwind.js"></script>
<script>
tailwind.config={
theme:{
extend:{
colors:{
primary: '#2563eb',
secondary: '#64748b'
},
borderRadius:{
'none':'0px',
'sm':'2px',
DEFAULT:'4px',
'md':'8px',
'lg':'12px',
'xl':'16px',
'2xl':'20px',
'3xl':'24px',
'full':'9999px',
'button':'4px'
}
}
}
}
</script>
<link rel="stylesheet" href="https://static.mastergo.com/static/ai/resource/html/font-awesome/css/all.min.css">
<style>
body {
min-height: 1024px;
background-color: #ffffff;
}
.form-container {
box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
border: 1px solid #e5e7eb;
}
.password-toggle {
cursor: pointer;
}
.error-message {
color: #ef4444;
font-size: 0.875rem;
margin-top: 0.25rem;
}
</style>
</head>
<body class="bg-white flex justify-center items-center p-4">
<div class="w-full max-w-md">
<div class="form-container bg-white rounded-xl p-8 w-full">
<div class="text-center mb-8">
<div class="font-['Pacifico'] text-3xl font-bold text-primary mb-2">logo</div>
<h1 class="text-2xl font-bold text-gray-900 mb-2">创建账户</h1>
<p class="text-sm text-gray-500">请输入您的信息以开始</p>
</div>
<form id="registerForm" class="space-y-6">
<div>
<label for="account" class="block text-sm font-medium text-gray-700 mb-1">账号</label>
<div class="relative">
<input
type="text"
id="account"
class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
placeholder="请输入6位数字账号"
required
maxlength="6"
>
<i class="fas fa-user absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400" style="width: 16px; height: 16px; display: flex; justify-content: center; align-items: center;"></i>
</div>
<div id="accountError" class="error-message hidden"></div>
</div>
<div>
<label for="password" class="block text-sm font-medium text-gray-700 mb-1">设置密码</label>
<div class="relative">
<input
type="password"
id="password"
class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
placeholder="至少 6 个字符"
required
>
<i class="fas fa-lock absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 password-toggle" id="togglePassword" style="width: 16px; height: 16px; display: flex; justify-content: center; align-items: center;"></i>
</div>
<div class="mt-2">
<div class="flex space-x-2">
<div class="h-1 bg-gray-200 rounded-full flex-1"></div>
<div class="h-1 bg-gray-200 rounded-full flex-1"></div>
<div class="h-1 bg-gray-200 rounded-full flex-1"></div>
</div>
<p id="strengthText" class="text-xs text-gray-500 mt-1">密码强度：</p>
</div>
<div id="passwordError" class="error-message hidden"></div>
</div>
<div>
<label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
<div class="relative">
<input
type="password"
id="confirmPassword"
class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
placeholder="再次输入密码"
required
>
<i class="fas fa-lock absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 password-toggle" id="toggleConfirmPassword" style="width: 16px; height: 16px; display: flex; justify-content: center; align-items: center;"></i>
</div>
<div id="passwordMatchError" class="hidden text-red-500 text-sm mt-1">两次输入的密码不一致</div>
</div>
<div class="flex items-start">
<div class="flex items-center h-5">
<input
id="terms"
type="checkbox"
class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
required
>
</div>
<div class="ml-3 text-sm">
<label for="terms" class="text-gray-700">
我同意<a href="#" class="text-blue-600 hover:text-blue-800">《服务条款》</a>和<a href="#" class="text-blue-600 hover:text-blue-800">《隐私政策》</a>
</label>
</div>
</div>
<button
type="submit"
id="submitBtn"
class="w-full bg-primary text-white py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 !rounded-button whitespace-nowrap transition"
>
免费注册
</button>
<div id="registerError" class="error-message text-center mt-4 hidden"></div>
</form>
<div class="mt-6 text-center">
<p class="text-sm text-gray-600">
已有账户？<a href="login.html" class="text-primary hover:text-blue-800 font-medium">立即登录</a>
</p>
</div>
</div>
<div class="text-center mt-8">
<p class="text-xs text-gray-500">© 2024 公司名称</p>
</div>
</div>
<script type="module">
import Auth from './auth.js';

// 页面加载时检查是否已登录，已登录则跳转到首页
if (Auth.isLoggedIn()) {
    window.location.href = 'index.html';
}

const passwordInput = document.getElementById('password');
const confirmPasswordInput = document.getElementById('confirmPassword');
const passwordMatchError = document.getElementById('passwordMatchError');
const togglePassword = document.getElementById('togglePassword');
const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
const registerForm = document.getElementById('registerForm');
const strengthText = document.getElementById('strengthText');

// 密码强度检测
function checkPasswordStrength(password) {
    let strength = 0;
    if (password.length >= 6) strength++;
    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;
    return strength;
}

function updateStrengthIndicator() {
    const strength = checkPasswordStrength(passwordInput.value);
    const bars = document.querySelectorAll('.h-1');
    const colors = ['bg-red-500', 'bg-yellow-500', 'bg-green-500'];
    
    bars.forEach((bar, index) => {
        bar.className = 'h-1 bg-gray-200 rounded-full flex-1';
    });
    
    if (passwordInput.value.length === 0) {
        strengthText.textContent = '密码强度：';
        return;
    }
    
    const level = Math.min(Math.floor(strength / 2), 2);
    for (let i = 0; i <= level; i++) {
        bars[i].classList.add(colors[level]);
    }
    
    const levels = ['弱', '中等', '强'];
    strengthText.textContent = '密码强度：' + levels[level];
}

passwordInput.addEventListener('input', updateStrengthIndicator);

// 密码匹配验证
function validatePasswords() {
if (confirmPasswordInput.value !== '' && passwordInput.value !== confirmPasswordInput.value) {
passwordMatchError.classList.remove('hidden');
return false;
} else {
passwordMatchError.classList.add('hidden');
return true;
}
}
confirmPasswordInput.addEventListener('input', validatePasswords);

// 密码显示/隐藏切换
togglePassword.addEventListener('click', function() {
const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
passwordInput.setAttribute('type', type);
this.classList.toggle('fa-lock');
this.classList.toggle('fa-unlock');
});
toggleConfirmPassword.addEventListener('click', function() {
const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
confirmPasswordInput.setAttribute('type', type);
this.classList.toggle('fa-lock');
this.classList.toggle('fa-unlock');
});

// 清除错误提示
function clearErrors() {
    document.getElementById('accountError').classList.add('hidden');
    document.getElementById('passwordError').classList.add('hidden');
    document.getElementById('registerError').classList.add('hidden');
}

function showError(field, message) {
    const errorEl = document.getElementById(field + 'Error');
    errorEl.textContent = message;
    errorEl.classList.remove('hidden');
}

// 表单提交处理
registerForm.addEventListener('submit', async function(e) {
e.preventDefault();
clearErrors();

const account = document.getElementById('account').value.trim();
const password = document.getElementById('password').value;
const confirmPassword = document.getElementById('confirmPassword').value;

if (!/^\d{6}$/.test(account)) {
    showError('account', '请输入6位数字账号');
    return;
}

if (password.length < 6) {
    showError('password', '密码至少6位');
    return;
}

if (!validatePasswords()) {
    return;
}

const submitButton = document.getElementById('submitBtn');
const originalText = submitButton.textContent;
submitButton.disabled = true;
submitButton.textContent = '注册中...';

try {
    const response = await fetch('http://localhost:5000/api/auth/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ account, password, confirmPassword })
    });
    
    const data = await response.json();
    
    if (data.success) {
        alert('注册成功！正在自动登录...');
        
        // 注册成功后自动登录
        try {
            const loginResponse = await fetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ account, password })
            });
            
            const loginData = await loginResponse.json();
            
            if (loginData.success) {
                const userData = loginData.data.user;
                const token = loginData.data.token;
                Auth.setUser(userData, token);
                
                // 记住账号
                localStorage.setItem('remembered_account', account);
                
                window.location.href = 'index.html';
            } else {
                // 登录失败，跳转到登录页
                window.location.href = 'login.html';
            }
        } catch (err) {
            window.location.href = 'login.html';
        }
    } else {
        showError('register', data.message || '注册失败');
        submitButton.disabled = false;
        submitButton.textContent = originalText;
    }
} catch (error) {
    showError('register', '注册失败，请检查网络连接');
    submitButton.disabled = false;
    submitButton.textContent = originalText;
}
});
</script>
</body>
</html>
