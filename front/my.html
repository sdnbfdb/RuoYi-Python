<script>
// 等待DOM和auth.js加载完成后再执行
document.addEventListener('DOMContentLoaded', function() {
    fetch('nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('nav-container').innerHTML = data;
            setTimeout(renderNavAuth, 0);
        })
        .catch(error => {
            console.error('导航栏加载失败:', error);
        });
});

function renderNavAuth() {
    const el = document.getElementById('auth-section');
    if (!el) {
        console.warn('auth-section元素未找到');
        return;
    }
    
    if (typeof Auth === 'undefined') {
        console.error('Auth对象未定义，请确保auth.js已正确加载');
        return;
    }
    
    if (Auth.isLoggedIn()) {
        const name = Auth.getUserName() || Auth.getAccount();
        el.innerHTML = `<div class="flex items-center space-x-3"><span class="text-gray-600 text-sm">欢迎，<span class="font-medium text-gray-900">${name}</span></span><a href="my.html" class="px-3 py-1.5 rounded-lg hover:bg-gray-100 text-sm text-gray-700 transition-colors">个人中心</a><button onclick="if(confirm('确定退出？'))Auth.logout()" class="text-gray-500 hover:text-red-500 transition-colors"><i class="fas fa-sign-out-alt"></i></button></div>`;
    } else {
        el.innerHTML = `<a href="login.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">登录</a>`;
    }
}
</script>

<script type="module">
import Auth from './auth.js';

// 页面加载时检查登录状态
document.addEventListener('DOMContentLoaded', function() {
    if (!Auth.isLoggedIn()) {
        // 未登录，跳转到登录页
        alert('请先登录！');
        window.location.href = 'login.html';
        return;
    }
    
    // 显示用户信息
    loadUserInfo();
});

// 加载用户信息
async function loadUserInfo() {
    const user = Auth.getUser();
    const defaultAvatar = 'https://static.mastergo.com/ai/img_res/1778469691761a3K9mP2xQ7vN4rT8wY.jpg';
    
    if (user) {
        document.getElementById('userName').textContent = user.name || user.username || '用户';
        document.getElementById('userAccount').textContent = `账号: ${user.account}`;
        
        // 显示本地缓存中的头像（如果有）
        if (user.image) {
            document.getElementById('avatarImg').src = user.image.startsWith('http') ? user.image : `http://localhost:5000${user.image}`;
        }
    }
    
    // 从后端获取最新用户信息（包含头像）
    try {
        const account = user ? user.account : '123456';
        const response = await fetch(`http://localhost:5000/api/auth/info?account=${account}`, {
            method: 'GET',
            credentials: 'include',
            mode: 'cors'
        });
        
        if (response.ok) {
            const data = await response.json();
            if (data.success && data.data) {
                // 更新本地存储的用户信息
                Auth.setUser(data.data, Auth.getToken());
                
                // 更新页面显示 - 用户名和账号
                document.getElementById('userName').textContent = data.data.name || data.data.username || '用户';
                document.getElementById('userAccount').textContent = `账号: ${data.data.account}`;
                
                // 更新头像显示
                const avatarImg = document.getElementById('avatarImg');
                if (data.data.image && data.data.image.trim() !== '') {
                    // 如果有头像URL，显示上传的头像
                    avatarImg.src = data.data.image.startsWith('http') ? data.data.image : `http://localhost:5000${data.data.image}`;
                    avatarImg.onerror = function() {
                        // 图片加载失败时显示默认头像
                        this.src = defaultAvatar;
                        console.warn('Avatar load failed, using default');
                    };
                } else {
                    // 没有头像，显示默认头像
                    avatarImg.src = defaultAvatar;
                }
                
                // 更新职位显示
                const positionDisplay = document.getElementById('positionDisplay');
                if (positionDisplay && data.data.role_level) {
                    positionDisplay.querySelector('p:first-child').textContent = data.data.role_level;
                }
                
                console.log('User info loaded successfully:', data.data);
            }
        }
    } catch (error) {
        console.log('获取用户信息失败，使用本地缓存:', error.message);
    }
}

// 退出登录
window.handleLogout = function() {
    if (confirm('确定要退出登录吗？')) {
        Auth.logout();
    }
};
</script>
