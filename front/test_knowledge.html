<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>知识库API测试页面</h1>
    
    <div id="status"></div>
    <div id="results"></div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function testAPI() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            statusDiv.innerHTML = '<p class="info">🔄 正在测试API...</p>';
            
            try {
                // 测试1: 检查API是否可访问
                statusDiv.innerHTML += '<p class="info">📡 测试1: 连接API...</p>';
                const url = `${API_BASE}/knowledge/list?page=1&size=6`;
                console.log('请求URL:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer mock_token_12345'
                    }
                });
                
                statusDiv.innerHTML += `<p class="success">✅ API响应状态: ${response.status}</p>`;
                
                // 测试2: 解析JSON
                statusDiv.innerHTML += '<p class="info">📥 测试2: 解析JSON...</p>';
                const result = await response.json();
                
                statusDiv.innerHTML += `<p class="success">✅ JSON解析成功</p>`;
                statusDiv.innerHTML += `<p class="success">✅ success字段: ${result.success}</p>`;
                
                // 测试3: 检查数据结构
                if (result.success && result.data) {
                    const { list, total, page, pages } = result.data;
                    
                    statusDiv.innerHTML += '<p class="success">✅ 数据结构正确</p>';
                    statusDiv.innerHTML += `<p class="info">📊 总记录数: ${total}</p>`;
                    statusDiv.innerHTML += `<p class="info">📊 当前页: ${page}/${pages}</p>`;
                    statusDiv.innerHTML += `<p class="info">📊 本页数量: ${list.length}</p>`;
                    
                    // 测试4: 显示数据
                    if (list && list.length > 0) {
                        statusDiv.innerHTML += '<p class="success">✅ 数据列表不为空</p>';
                        
                        resultsDiv.innerHTML = '<h2>📚 知识库资料列表</h2>';
                        
                        list.forEach((item, index) => {
                            resultsDiv.innerHTML += `
                                <div class="card">
                                    <h3>${index + 1}. ${item.title || '未命名'}</h3>
                                    <p><strong>ID:</strong> ${item.id}</p>
                                    <p><strong>类型:</strong> ${item.type}</p>
                                    <p><strong>大小:</strong> ${item.size_display || item.total_size}</p>
                                    <p><strong>附件数:</strong> ${item.attachment_count}</p>
                                    <p><strong>创建时间:</strong> ${item.created_at}</p>
                                    <details>
                                        <summary>查看完整数据</summary>
                                        <pre>${JSON.stringify(item, null, 2)}</pre>
                                    </details>
                                </div>
                            `;
                        });
                        
                        statusDiv.innerHTML += '<p class="success">✅ 全部测试通过！</p>';
                    } else {
                        statusDiv.innerHTML += '<p class="error">❌ 数据列表为空</p>';
                        resultsDiv.innerHTML = '<p class="error">没有找到任何资料</p>';
                    }
                } else {
                    statusDiv.innerHTML += '<p class="error">❌ 数据结构不正确</p>';
                    resultsDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
                }
                
            } catch (error) {
                statusDiv.innerHTML += `<p class="error">❌ 错误: ${error.message}</p>`;
                console.error('测试失败:', error);
                resultsDiv.innerHTML = `<pre>错误详情:\n${error.stack}</pre>`;
            }
        }
        
        // 页面加载时自动测试
        window.addEventListener('DOMContentLoaded', testAPI);
    </script>
</body>
</html>
