<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>知识库</title>

<!-- 导航栏直接内嵌，避免 file:// 协议下 fetch 失败 -->

<div class="flex items-center space-x-10">

<div class="flex space-x-8">

<a href="knowledge.html" class="text-primary hover:text-blue-700 font-medium">知识库</a>
<a href="operation.html" class="text-gray-600 hover:text-gray-900 font-medium">操作</a>

<script src="./auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const el = document.getElementById('auth-section');
    if (!el || typeof Auth === 'undefined') return;
    if (Auth.isLoggedIn()) {
        const name = Auth.getUserName() || Auth.getAccount();
        el.innerHTML = `<div class="flex items-center space-x-3"><span class="text-gray-600 text-sm">欢迎，<span class="font-medium text-gray-900">${name}</span></span><a href="my.html" class="px-3 py-1.5 rounded-lg hover:bg-gray-100 text-sm text-gray-700 transition-colors">个人中心</a><button onclick="if(confirm('确定退出？'))Auth.logout()" class="text-gray-500 hover:text-red-500 transition-colors"><i class="fas fa-sign-out-alt"></i></button></div>`;
    } else {
        el.innerHTML = `<a href="login.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">登录</a>`;
    }
});
</script>

            <div class="flex items-center space-x-4">

                <div class="flex space-x-2 items-center">
                    <button onclick="filterMaterials('all')" class="filter-btn px-3 py-1 text-sm bg-primary text-white rounded-md hover:bg-blue-700 transition-colors" data-filter="all">全部</button>
                    <button onclick="filterMaterials('doc')" class="filter-btn px-3 py-1 text-sm text-gray-600 hover:bg-gray-100 rounded-md transition-colors" data-filter="doc">文档</button>
                    <button onclick="filterMaterials('video')" class="filter-btn px-3 py-1 text-sm text-gray-600 hover:bg-gray-100 rounded-md transition-colors" data-filter="video">视频</button>
                    <button onclick="filterMaterials('image')" class="filter-btn px-3 py-1 text-sm text-gray-600 hover:bg-gray-100 rounded-md transition-colors" data-filter="image">图片</button>
                    <button onclick="openGraphView()" class="filter-btn px-3 py-1 text-sm text-gray-600 hover:bg-gray-100 rounded-md transition-colors"><i class="fas fa-project-diagram mr-1"></i>查看图谱</button>

<script src="https://static.mastergo.com/static/ai/resource/html/font-awesome/css/all.min.css"></script>
<script>
// Auth 已通过 script src 加载，无需 import

const API_BASE = 'http://localhost:5000/api';

// 从 auth.js 获取正确的 Token
function getCurrentUserToken() {
    const token = Auth.getToken();
    if (token) {
        console.log('✅ 使用真实Token:', token.substring(0, 20) + '...');
        return token;
    }
    
    console.warn('⚠️ 未找到Token，使用默认Token');
    return 'mock_token_12345';
}

// 初始化 Token
let currentUserToken = getCurrentUserToken();

// 监听登录状态变化（支持多标签页同步）
window.addEventListener('storage', function(event) {
    if (event.key === 'ruoyi_token') {
        currentUserToken = getCurrentUserToken();
        console.log('🔄 Token已更新');
    }
});

let currentFilter = 'all';
let currentSearch = '';
let currentPage = 1;
let itemsPerPage = 6;
let currentViewMode = 'grid';
let deleteTargetId = null;
let materialsData = [];
let totalItems = 0;

// 页面初始化
document.addEventListener('DOMContentLoaded', function() {
    // 检查登录状态
    if (!Auth.isLoggedIn()) {
        alert('请先登录后再访问知识库！');
        window.location.href = 'login.html';
        return;
    }
    
    console.log('✅ 用户已登录，开始加载知识库...');
    console.log('👤 当前用户:', Auth.getUserName());
    console.log('🔑 Token:', currentUserToken.substring(0, 20) + '...');
    
    renderMaterials();
    
    // 检查 GraphRAG 图谱状态
    checkGraphStatus();
});

// 渲染资料列表
async function renderMaterials() {
    const container = document.getElementById('materials-container');
    const emptyState = document.getElementById('empty-state');
    
    // 每次请求前刷新Token
    currentUserToken = getCurrentUserToken();
    
    console.log('🔄 开始加载资料列表...');
    console.log('📍 API地址:', `${API_BASE}/knowledge/list`);
    console.log('🔑 Token前20位:', currentUserToken.substring(0, 20) + '...');
    
    try {
        const url = `${API_BASE}/knowledge/list?filter=${currentFilter}&search=${encodeURIComponent(currentSearch)}&page=${currentPage}&size=${itemsPerPage}`;
        console.log('🌐 请求URL:', url);
        
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${currentUserToken}`
            },
            mode: 'cors'
        });
        
        console.log('📥 收到响应:', response.status, response.statusText);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const result = await response.json();
        console.log('✅ 解析响应成功:', result.success);
        
        if (!result.success) {
            throw new Error(result.message || '获取数据失败');
        }
        
        materialsData = result.data.list || [];
        totalItems = result.data.total || 0;
        const totalPages = result.data.pages || 0;
        
        console.log('📊 数据解析结果:', {
            listLength: materialsData.length,
            totalItems: totalItems,
            totalPages: totalPages,
            firstItem: materialsData[0] ? materialsData[0].title : '无'
        });
        
        // 更新总数
        const totalCountEl = document.getElementById('total-count');
        if (totalCountEl) {
            totalCountEl.textContent = totalItems;
            console.log('✅ 更新总数显示:', totalItems);
        } else {
            console.warn('⚠️ 找不到 total-count 元素');
        }
        
        if (materialsData.length === 0) {
            console.log('📭 数据为空，显示空状态');
            container.innerHTML = '';
            emptyState.classList.remove('hidden');
            return;
        }
        
        console.log('🎨 开始生成卡片...');
        emptyState.classList.add('hidden');
        
        // 更新分页控件
        updatePagination(currentPage, totalPages);
        
        // 生成卡片 HTML
        const cardsHTML = materialsData.map(item => createMaterialCard(item)).join('');
        console.log('📝 生成HTML长度:', cardsHTML.length);
        container.innerHTML = cardsHTML;
        console.log('✅ 卡片渲染完成');
        
    } catch (error) {
        console.error('❌ 加载资料列表失败:', error);
        console.error('错误详情:', {
            message: error.message,
            name: error.name,
            stack: error.stack
        });
        
        // 显示详细的错误信息
        let errorDetails = error.message;
        if (error.message.includes('Failed to fetch')) {
            errorDetails = '无法连接到后端服务\n\n' +
                '可能原因:\n' +
                '1. 后端服务未启动 (python app.py)\n' +
                '2. 后端端口被占用\n' +
                '3. 网络连接问题\n\n' +
                '原始错误: ' + error.message;
        }
        
        container.innerHTML = `
            <div class="col-span-full text-center py-16">
                <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
                <p class="text-gray-600 mb-2">加载失败</p>
                <pre class="text-sm text-gray-400 whitespace-pre-wrap text-left max-w-2xl mx-auto bg-gray-50 p-4 rounded">${errorDetails}</pre>
                <button onclick="renderMaterials()" class="mt-4 px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-600">
                    重试
                </button>
            </div>
        `;
    }
}

// 创建资料卡片
function createMaterialCard(item) {
    console.log('🎴 创建卡片:', item.title, 'ID:', item.id);
    
    const typeConfig = {
        doc: { icon: 'fa-file-alt', color: 'blue', label: '文档' },
        video: { icon: 'fa-video', color: 'green', label: '视频' },
        image: { icon: 'fa-image', color: 'purple', label: '图片' },
        other: { icon: 'fa-folder', color: 'gray', label: '其他' }
    };
    
    const config = typeConfig[item.type] || typeConfig.other;
    
    // 安全获取字段（处理不同命名规范）
    const title = item.title || '未命名';
    const createdAt = item.created_at || item.createdAt || '-';
    const description = item.description || '';
    const size = item.size_display || item.size || '-';
    const tags = item.tags || [];
    
    return `
        <div class="material-card bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-all duration-300 cursor-pointer" onclick="viewMaterial('${item.id}')">
            <div class="flex items-start justify-between mb-4">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-${config.color}-100 rounded-lg flex items-center justify-center flex-shrink-0">
                        <i class="fas ${config.icon} text-${config.color}-600"></i>
                    </div>
                    <div class="min-w-0 flex-1">
                        <h3 class="font-semibold text-gray-900 truncate">${title}</h3>
                        <p class="text-sm text-gray-500">${createdAt}</p>
                    </div>
                </div>
                <div class="relative flex-shrink-0 ml-2" onclick="event.stopPropagation()">

// 分页控制
function updatePagination(current, total) {
    const pageNumbers = document.getElementById('pageNumbers');
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    
    prevBtn.disabled = current <= 1;
    nextBtn.disabled = current >= total;
    
    let html = '';
    for (let i = 1; i <= total; i++) {
        if (i === current) {
            html += `<button class="px-3 py-2 bg-primary text-white rounded-lg">${i}</button>`;
        } else {
            html += `<button onclick="goToPage(${i})" class="px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">${i}</button>`;
        }
    }
    pageNumbers.innerHTML = html;
}

function changePage(direction) {
    if (direction === 'prev' && currentPage > 1) {
        currentPage--;
    } else if (direction === 'next') {
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        if (currentPage < totalPages) {
            currentPage++;
        }
    }
    renderMaterials();
}

function goToPage(page) {
    currentPage = page;
    renderMaterials();
}

// 保存资料
async function saveMaterial() {
    const id = document.getElementById('material-id').value;
    
    // 每次保存前刷新Token
    currentUserToken = getCurrentUserToken();
    
    console.log('📤 保存资料，当前Token:', currentUserToken.substring(0, 20) + '...');
    
    const fileInput = document.getElementById('file-input');
    const files = fileInput ? Array.from(fileInput.files) : [];
    
    if (!id && files.length === 0) {
        alert('请选择要上传的文件');
        return;
    }
    
    try {
        let result;
        
        if (id) {
            // 编辑模式 - 只上传新文件
            const formData = new FormData();
            
            if (files.length > 0) {
                for (let file of files) {
                    formData.append('files', file);
                }
            }
            
            const response = await fetch(`${API_BASE}/knowledge/update/${id}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentUserToken}`
                },
                body: formData,
                mode: 'cors'
            });
            
            result = await response.json();
            
            if (!response.ok) {
                throw new Error(result.message || `服务器错误 (${response.status})`);
            }
            
        } else {
            // 创建模式 - 从第一个文件获取标题和类型
            const firstFile = files[0];
            
            // 自动从文件名提取标题（去掉扩展名）
            const title = firstFile.name.replace(/\.[^/.]+$/, '');
            
            // 根据扩展名自动判断类型
            const ext = firstFile.name.split('.').pop().toLowerCase();
            const docExts = ['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'txt', 'md'];
            const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'bmp', 'svg'];
            const videoExts = ['mp4', 'avi', 'mov', 'wmv', 'flv', 'mkv'];
            
            let type = 'other';
            if (docExts.includes(ext)) type = 'doc';
            else if (imageExts.includes(ext)) type = 'image';
            else if (videoExts.includes(ext)) type = 'video';
            
            const formData = new FormData();
            formData.append('title', title);
            formData.append('type', type);
            formData.append('description', `上传的${type === 'doc' ? '文档' : type === 'image' ? '图片' : type === 'video' ? '视频' : '文件'}：${firstFile.name}`);
            formData.append('content', '');
            
            for (let file of files) {
                formData.append('files', file);
            }
            
            // 调试日志
            console.log('📤 创建资料请求详情:');
            console.log('   URL:', `${API_BASE}/knowledge/create`);
            console.log('   Method:', 'POST');
            console.log('   Token:', currentUserToken.substring(0, 20) + '...');
            console.log('   Title:', title);
            console.log('   Type:', type);
            console.log('   Files:', files.map(f => f.name));
            
            // 删除不必要的 headers 配置，让浏览器自动处理
            const response = await fetch(`${API_BASE}/knowledge/create`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentUserToken}`
                    // 注意：不要设置 Content-Type，让浏览器自动处理 FormData
                },
                body: formData,
                mode: 'cors',
                credentials: 'include'  // 添加这个以确保发送凭证
            });
            
            console.log('📥 创建资料响应状态:', response.status, response.statusText);
            console.log('📥 响应头:', Object.fromEntries(response.headers.entries()));
            
            // 先获取响应文本
            const responseText = await response.text();
            console.log('📥 响应文本:', responseText);
            
            // 再解析 JSON
            result = JSON.parse(responseText);
            console.log('📥 解析后的结果:', result);
            
            if (!response.ok) {
                throw new Error(result.message || `服务器错误 (${response.status})`);
            }
        }
        
        if (!result.success) {
            throw new Error(result.message || '操作失败');
        }
        
        closeModal();
        
        // 重新加载数据（回到第一页）
        currentPage = 1;
        await renderMaterials();
        
        alert(id ? '资料更新成功！' : '资料添加成功！');
        
    } catch (error) {
        console.error('保存失败:', error);
        console.error('错误详情:', {
            message: error.message,
            name: error.name,
            stack: error.stack
        });
        
        let errorMsg = '保存失败';
        if (error.message.includes('Failed to fetch')) {
            errorMsg = '网络连接失败：无法连接到后端服务\n\n可能的原因：\n1. 后端服务未启动 (python app.py)\n2. 后端地址配置错误 (当前: http://localhost:5000)\n3. 防火墙阻止了请求';
        } else if (error.message.includes('HTTP 401')) {
            errorMsg = '未授权访问，请先登录';
        } else if (error.message.includes('HTTP 400')) {
            errorMsg = '请求参数错误：' + (result?.message || '请检查文件格式和大小');
        } else if (error.message.includes('HTTP 413')) {
            errorMsg = '文件太大，请选择小于10MB的文件';
        } else if (error.message.includes('HTTP')) {
            errorMsg = `服务器错误: ${error.message}`;
        } else {
            errorMsg = `保存失败: ${error.message}`;
        }
        
        alert(errorMsg);
    }
}

// 触发图谱索引构建
async function buildGraphIndex() {
    if (graphIsBuilding) return;
    const btn = document.getElementById('buildGraphBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>构建中...';
    btn.disabled = true;
    graphIsBuilding = true;

    try {
        const response = await fetch(`${API_BASE}/graph/build`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${currentUserToken}`,
                'Content-Type': 'application/json'
            },
            mode: 'cors'
        });
        const result = await response.json();
        if (result.success) {
            alert(result.message + '\n\n构建过程需要几分钟，请稍后刷新页面查看状态。');
            // 轮询检查状态
            let pollCount = 0;
            const pollInterval = setInterval(async () => {
                pollCount++;
                if (pollCount > 30) { 
                    clearInterval(pollInterval); 
                    graphIsBuilding = false;
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    checkGraphStatus();
                    return; 
                }
                try {
                    const statusRes = await fetch(`${API_BASE}/graph/status`, {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${currentUserToken}` },
                        mode: 'cors'
                    });
                    const statusResult = await statusRes.json();
                    if (statusResult.success && statusResult.data.status === 'ready') {
                        clearInterval(pollInterval);
                        graphIsBuilding = false;
                        graphIsReady = true;
                        checkGraphStatus();
                        alert('图谱索引构建完成！');
                    }
                } catch (e) {
                    console.warn('轮询状态失败:', e);
                }
            }, 10000);
        } else {
            alert('构建失败: ' + result.message);
            graphIsBuilding = false;
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    } catch (error) {
        console.error('构建图谱失败:', error);
        alert('构建请求失败: ' + error.message);
        graphIsBuilding = false;
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

async function loadGraphData() {
    const container = document.getElementById('graph-container');
    container.innerHTML = '<canvas id="graphCanvas" class="w-full h-full"></canvas>';

    // 先尝试从后端 GraphRAG API 获取真实图谱数据
    if (graphIsReady) {
        try {
            await loadRealGraphData();
            return;
        } catch (e) {
            console.warn('后端图谱数据加载失败，回退到本地模式:', e);
        }
    }

    // 回退：从知识库列表构建简单图谱
    try {
        currentUserToken = getCurrentUserToken();
        const response = await fetch(`${API_BASE}/knowledge/list?filter=all&search=&page=1&size=100`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${currentUserToken}` },
            mode: 'cors'
        });
        const result = await response.json();
        if (result.success) {
            const allData = result.data.list || [];
            buildGraphFromLocal(allData);
            drawGraph();
            document.getElementById('graph-stats').textContent = `共 ${graphNodes.length} 个节点，${graphEdges.length} 条关系 (本地模式)`;
            document.getElementById('graphBuildStatus').innerHTML = '<i class="fas fa-info-circle mr-1"></i>图谱状态: 本地模式（点击"构建图谱"可生成智能图谱）';
        }
    } catch (error) {
        console.error('加载图谱数据失败:', error);
        container.innerHTML = '<div class="text-center text-gray-500 py-20">加载图谱数据失败，请确保后端服务已启动</div>';
    }
}

// 从后端 GraphRAG API 加载真实图谱数据
async function loadRealGraphData() {
    currentUserToken = getCurrentUserToken();

    // 并行获取实体和关系
    const [entitiesRes, relationsRes] = await Promise.all([
        fetch(`${API_BASE}/graph/entities`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${currentUserToken}` },
            mode: 'cors'
        }),
        fetch(`${API_BASE}/graph/relationships`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${currentUserToken}` },
            mode: 'cors'
        })
    ]);

    const entitiesResult = await entitiesRes.json();
    const relationsResult = await relationsRes.json();

    if (entitiesResult.success && relationsResult.success) {
        buildGraphFromBackend(entitiesResult.data.entities, relationsResult.data.relationships);
        drawGraph();
        document.getElementById('graph-stats').textContent = `共 ${graphNodes.length} 个节点，${graphEdges.length} 条关系 (GraphRAG)`;
        document.getElementById('graphBuildStatus').innerHTML = '<i class="fas fa-check-circle mr-1 text-green-500"></i>图谱状态: GraphRAG 智能图谱';
    } else {
        throw new Error('后端数据返回失败');
    }
}

// 使用后端实体和关系数据构建图谱
function buildGraphFromBackend(entities, relationships) {
    graphNodes = [];
    graphEdges = [];
    const canvasW = document.getElementById('graph-container').clientWidth || 900;
    const canvasH = document.getElementById('graph-container').clientHeight || 500;
    const centerX = canvasW / 2, centerY = canvasH / 2;

    // 按类型分组
    const typeGroups = {};
    entities.forEach(e => {
        const t = e.type || '其他';
        if (!typeGroups[t]) typeGroups[t] = [];
        typeGroups[t].push(e);
    });

    // 中心节点
    graphNodes.push({ id: 'root', label: '知识库', x: centerX, y: centerY, color: '#1e293b', radius: 35, type: 'root' });

    // 类型分类节点（环形布局）
    const typeNames = Object.keys(typeGroups);
    const typeAngle = (2 * Math.PI) / Math.max(typeNames.length, 1);
    const typeNodeMap = {};
    const typeColorsMap = {};
    const palette = ['#3b82f6', '#22c55e', '#a855f7', '#f59e0b', '#ef4444', '#14b8a6', '#6366f1', '#ec4899'];

    typeNames.forEach((typeName, idx) => {
        const angle = idx * typeAngle;
        const dist = 180;
        const tx = centerX + Math.cos(angle) * dist;
        const ty = centerY + Math.sin(angle) * dist;
        const typeNodeId = `type_${typeName}`;
        const color = palette[idx % palette.length];
        typeColorsMap[typeName] = color;
        graphNodes.push({ id: typeNodeId, label: typeName, x: tx, y: ty, color: color, radius: 28, type: 'category' });
        graphEdges.push({ source: 'root', target: typeNodeId });
        typeNodeMap[typeName] = typeNodeId;
    });

    // 实体节点
    const entityNodeMap = {};
    typeNames.forEach((typeName, tIdx) => {
        const items = typeGroups[typeName];
        const angle = tIdx * typeAngle;
        items.forEach((item, i) => {
            const ia = angle + (i - items.length / 2) * 0.25;
            const idist = 320 + (i % 3) * 40;
            const ix = centerX + Math.cos(ia) * idist;
            const iy = centerY + Math.sin(ia) * idist;
            const nodeId = `entity_${item.id}`;
            entityNodeMap[item.name || item.id] = nodeId;
            graphNodes.push({
                id: nodeId,
                label: item.name || item.id,
                x: ix,
                y: iy,
                color: typeColorsMap[typeName],
                radius: 16 + (item.rank || 0) * 2,
                type: 'entity',
                data: item
            });
            graphEdges.push({ source: typeNodeMap[typeName], target: nodeId });
        });
    });

    // 关系连线
    relationships.forEach(rel => {
        const sourceId = entityNodeMap[rel.source];
        const targetId = entityNodeMap[rel.target];
        if (sourceId && targetId) {
            graphEdges.push({
                source: sourceId,
                target: targetId,
                label: rel.type || '',
                weight: rel.weight || 1
            });
        }
    });
}

// 本地简单图谱（回退模式）
function buildGraphFromLocal(data) {
    graphNodes = [];
    graphEdges = [];
    const typeColors = { doc: '#3b82f6', video: '#22c55e', image: '#a855f7', other: '#9ca3af' };
    const typeLabels = { doc: '文档', video: '视频', image: '图片', other: '其他' };
    const canvasW = document.getElementById('graph-container').clientWidth || 900;
    const canvasH = document.getElementById('graph-container').clientHeight || 500;
    const centerX = canvasW / 2, centerY = canvasH / 2;

    // 中心节点
    graphNodes.push({ id: 'root', label: '知识库', x: centerX, y: centerY, color: '#1e293b', radius: 35, type: 'root' });

    // 类型分类节点
    const types = {};
    data.forEach(item => {
        const t = item.type || 'other';
        if (!types[t]) types[t] = [];
        types[t].push(item);
    });

    const typeAngle = (2 * Math.PI) / Math.max(Object.keys(types).length, 1);
    let typeIdx = 0;
    const typeNodeMap = {};

    for (const [type, items] of Object.entries(types)) {
        const angle = typeIdx * typeAngle;
        const dist = 180;
        const tx = centerX + Math.cos(angle) * dist;
        const ty = centerY + Math.sin(angle) * dist;
        const typeNodeId = `type_${type}`;
        graphNodes.push({ id: typeNodeId, label: typeLabels[type] || type, x: tx, y: ty, color: typeColors[type] || '#9ca3af', radius: 25, type: 'category' });
        graphEdges.push({ source: 'root', target: typeNodeId });
        typeNodeMap[type] = typeNodeId;

        // 资料节点
        items.forEach((item, i) => {
            const ia = angle + (i - items.length / 2) * 0.3;
            const idist = 320;
            const ix = centerX + Math.cos(ia) * idist;
            const iy = centerY + Math.sin(ia) * idist;
            graphNodes.push({ id: item.id, label: item.title || '未命名', x: ix, y: iy, color: typeColors[type] || '#9ca3af', radius: 18, type: 'item', data: item });
            graphEdges.push({ source: typeNodeId, target: item.id });
        });
        typeIdx++;
    }
}

function drawGraph() {
    const canvas = document.getElementById('graphCanvas');
    const container = document.getElementById('graph-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight || 500;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(canvas.width / 2 + graphTranslate.x, canvas.height / 2 + graphTranslate.y);
    ctx.scale(graphScale, graphScale);
    ctx.translate(-canvas.width / 2, -canvas.height / 2);

    // 画连线
    graphEdges.forEach(edge => {
        const source = graphNodes.find(n => n.id === edge.source);
        const target = graphNodes.find(n => n.id === edge.target);
        if (source && target) {
            const isHovered = graphHoverNode && (source.id === graphHoverNode || target.id === graphHoverNode);
            ctx.beginPath();
            ctx.moveTo(source.x, source.y);
            ctx.lineTo(target.x, target.y);
            ctx.strokeStyle = isHovered ? '#60a5fa' : '#e2e8f0';
            const weight = edge.weight || 1;
            const baseWidth = isHovered ? 1.2 : 0.5;
            ctx.lineWidth = Math.min(baseWidth + weight * 0.1, baseWidth * 2) / graphScale;
            ctx.stroke();

            // 关系标签
            if (edge.label) {
                const mx = (source.x + target.x) / 2;
                const my = (source.y + target.y) / 2;
                ctx.fillStyle = isHovered ? '#3b82f6' : '#94a3b8';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(edge.label, mx, my - 3);
            }
        }
    });

    // 画节点
    graphNodes.forEach(node => {
        const isHovered = graphHoverNode === node.id;
        const r = isHovered ? node.radius + 4 : node.radius;

        // 阴影
        ctx.beginPath();
        ctx.arc(node.x, node.y, r + 2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fill();

        // 节点圆
        ctx.beginPath();
        ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
        ctx.fillStyle = node.color;
        ctx.fill();

        // 标签
        ctx.fillStyle = '#1e293b';
        ctx.font = `${node.type === 'root' ? 'bold 14px' : node.type === 'category' ? 'bold 12px' : '11px'} sans-serif`;
        ctx.textAlign = 'center';
        const labelY = node.y + r + 16;
        ctx.fillText(node.label, node.x, labelY);
    });

    ctx.restore();
}

function zoomIn() {
    const newScale = Math.min(3, graphScale * 1.2);
    const centerX = document.getElementById('graphCanvas').width / 2;
    const centerY = document.getElementById('graphCanvas').height / 2;
    graphTranslate.x = centerX / (newScale / graphScale) - (centerX - graphTranslate.x) / graphScale;
    graphTranslate.y = centerY / (newScale / graphScale) - (centerY - graphTranslate.y) / graphScale;
    graphScale = newScale;
    drawGraph();
    updateZoomDisplay();
}

function zoomOut() {
    const newScale = Math.max(0.3, graphScale / 1.2);
    const centerX = document.getElementById('graphCanvas').width / 2;
    const centerY = document.getElementById('graphCanvas').height / 2;
    graphTranslate.x = centerX / (newScale / graphScale) - (centerX - graphTranslate.x) / graphScale;
    graphTranslate.y = centerY / (newScale / graphScale) - (centerY - graphTranslate.y) / graphScale;
    graphScale = newScale;
    drawGraph();
    updateZoomDisplay();
}

function resetZoom() {
    graphScale = 1;
    graphTranslate = { x: 0, y: 0 };
    drawGraph();
    updateZoomDisplay();
}

function updateZoomDisplay() {
    const zoomEl = document.getElementById('zoomDisplay');
    if (zoomEl) {
        zoomEl.textContent = Math.round(graphScale * 100) + '%';
    }
}

// Canvas 交互
document.addEventListener('DOMContentLoaded', function() {
    const canvas = document.getElementById('graphCanvas');
    if (!canvas) return;

    function screenToGraph(sx, sy) {
        const rect = canvas.getBoundingClientRect();
        const x = (sx - rect.left - canvas.width / 2 - graphTranslate.x) / graphScale + canvas.width / 2;
        const y = (sy - rect.top - canvas.height / 2 - graphTranslate.y) / graphScale + canvas.height / 2;
        return { x, y };
    }

    canvas.addEventListener('mousemove', function(e) {
        if (graphPanning) {
            graphTranslate.x = e.clientX - graphPanOffset.x;
            graphTranslate.y = e.clientY - graphPanOffset.y;
            drawGraph();
            return;
        }

        if (graphDragging) {
            const pos = screenToGraph(e.clientX, e.clientY);
            graphDragging.x = pos.x - graphDragOffset.x;
            graphDragging.y = pos.y - graphDragOffset.y;
            drawGraph();
            return;
        }

        const pos = screenToGraph(e.clientX, e.clientY);
        let hit = null;
        for (const node of graphNodes) {
            const dx = pos.x - node.x, dy = pos.y - node.y;
            if (dx * dx + dy * dy < (node.radius + 5) * (node.radius + 5)) {
                hit = node.id;
                break;
            }
        }
        if (hit !== graphHoverNode) {
            graphHoverNode = hit;
            canvas.style.cursor = hit ? 'pointer' : 'grab';
            drawGraph();
        }
    });

    canvas.addEventListener('mousedown', function(e) {
        const pos = screenToGraph(e.clientX, e.clientY);
        for (const node of graphNodes) {
            const dx = pos.x - node.x, dy = pos.y - node.y;
            if (dx * dx + dy * dy < (node.radius + 5) * (node.radius + 5)) {
                graphDragging = node;
                graphDragOffset = { x: pos.x - node.x, y: pos.y - node.y };
                return;
            }
        }
        graphPanning = true;
        graphPanOffset = { x: e.clientX - graphTranslate.x, y: e.clientY - graphTranslate.y };
        canvas.style.cursor = 'grabbing';
    });

    canvas.addEventListener('mouseup', function() {
        graphDragging = null;
        graphPanning = false;
        canvas.style.cursor = 'grab';
    });

    canvas.addEventListener('mouseleave', function() {
        graphDragging = null;
        graphPanning = false;
        graphHoverNode = null;
        canvas.style.cursor = 'grab';
        drawGraph();
    });

    canvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.max(0.2, Math.min(5, graphScale * delta));
        
        const oldGraphX = (mouseX - canvas.width / 2 - graphTranslate.x) / graphScale + canvas.width / 2;
        const oldGraphY = (mouseY - canvas.height / 2 - graphTranslate.y) / graphScale + canvas.height / 2;
        
        graphScale = newScale;
        
        graphTranslate.x = mouseX - canvas.width / 2 - (oldGraphX - canvas.width / 2) * graphScale;
        graphTranslate.y = mouseY - canvas.height / 2 - (oldGraphY - canvas.height / 2) * graphScale;
        
        drawGraph();
        updateZoomDisplay();
    }, { passive: false });

    canvas.addEventListener('dblclick', function(e) {
        const pos = screenToGraph(e.clientX, e.clientY);
        for (const node of graphNodes) {
            const dx = pos.x - node.x, dy = pos.y - node.y;
            if (dx * dx + dy * dy < (node.radius + 5) * (node.radius + 5) && node.type === 'item' && node.data) {
                closeGraphModal();
                viewMaterial(node.data.id);
                break;
            }
        }
    });
});
