<script>
window.qrCodeReady = false;
function checkQRCodeLib() {
    if (typeof QRCode !== 'undefined') {
        window.qrCodeReady = true;
        console.log('qrcode.js 加载成功');
    } else if (typeof qrcode !== 'undefined') {
        window.QRCode = qrcode;

        console.warn('qrcode.js 未加载，将使用备用方案');
        window.qrCodeReady = false;
    }
}

function saveToHistory(question, answer, questionAttachments = [], answerAttachments = []) {
// 查找是否已有相同 conversation_id 的记录
const existingIndex = chatHistory.findIndex(item => item.id === currentConversationId);
let item;
if (existingIndex >= 0) {
// 更新现有记录：追加新的问答对
item = chatHistory[existingIndex];
if (!item.qa_pairs) {
item.qa_pairs = [{ question: item.first_question || item.question, answer: item.last_answer || item.answer, question_attachments: [], answer_attachments: [] }];
}
item.qa_pairs.push({ question: question, answer: answer, question_attachments: questionAttachments, answer_attachments: answerAttachments });
item.turns = item.qa_pairs.length;
item.last_answer = answer.substring(0, 200);
item.time = new Date().toLocaleString('zh-CN');
// 移到最前面
chatHistory.splice(existingIndex, 1);
chatHistory.unshift(item);
} else {
// 新建记录
item = {
id: currentConversationId || Date.now().toString(),
first_question: question,
last_answer: answer.substring(0, 200),
qa_pairs: [{ question: question, answer: answer, question_attachments: questionAttachments, answer_attachments: answerAttachments }],
time: new Date().toLocaleString('zh-CN'),
turns: 1
};
chatHistory.unshift(item);
}
if (chatHistory.length > 50) {
chatHistory = chatHistory.slice(0, 50);
}
renderHistory();

// 同步保存到后端
fetch(`${API_BASE_URL}/api/chat/history`, {
method: 'POST',
headers: getAuthHeaders(),
body: JSON.stringify({
id: item.id,
time: item.time,
qa_pairs: item.qa_pairs
})
}).catch(e => console.error('保存历史记录到后端失败:', e));
}

function truncateText(text, maxLength) {
    if (!text) return '无标题';
    text = text.replace(/\n/g, ' ').trim();
    if (text.length > maxLength) {
        return text.substring(0, maxLength) + '...';
    }
    return text;
}

function renderHistory() {
const historyList = document.getElementById('historyList');

if (chatHistory.length === 0) {
historyList.innerHTML = '<div class="text-gray-400 text-sm text-center py-8">暂无历史记录</div>';
return;
}

historyList.innerHTML = chatHistory.map((item, index) => {
const rawQuestion = item.first_question || item.question || '无标题';
const displayQuestion = truncateText(rawQuestion, 24);
const turns = item.turns || 1;
const turnsBadge = turns > 1 ? `<span class="ml-2 px-1.5 py-0.5 bg-blue-100 text-blue-600 text-xs rounded">${turns}轮</span>` : '';
return `
<div class="history-item bg-white rounded-lg p-3 cursor-pointer hover:bg-blue-50 transition-colors border border-gray-100 flex items-start justify-between group overflow-hidden" data-index="${index}">
<div class="flex-1 history-content min-w-0">
<div class="flex items-center gap-1 min-w-0">
<div class="text-sm text-gray-800 truncate min-w-0" title="${rawQuestion}">${displayQuestion}</div>
${turnsBadge}

</div>
<button class="delete-history-btn ml-2 opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all flex-shrink-0" title="删除记录">

</div>
`;
}).join('');

function loadHistoryConversation(index) {
const item = chatHistory[index];
const messageList = document.getElementById('messageList');
if (messageList) messageList.innerHTML = '';
hideWelcome();
// 加载完整的多轮对话
if (item.qa_pairs && item.qa_pairs.length > 0) {
item.qa_pairs.forEach(pair => {
addMessage(pair.question, true, false, pair.question_attachments || []);
addMessage(pair.answer, false, false, pair.answer_attachments || []);
});
} else if (item.question && item.answer) {
addMessage(item.question, true);
addMessage(item.answer, false);
}
messageInput.value = '';
selectedImage = null;
clearImagePreview();
currentConversationId = item.id;
// 重建 history_messages
if (item.qa_pairs && item.qa_pairs.length > 0) {
currentHistoryMessages = [];
item.qa_pairs.forEach(pair => {
currentHistoryMessages.push({ role: 'user', content: pair.question });
currentHistoryMessages.push({ role: 'assistant', content: pair.answer });
});

} else {
currentHistoryMessages = [
{ role: 'user', content: item.question || item.first_question },
{ role: 'assistant', content: item.answer || item.last_answer }
];
}
chatMessages.scrollTop = chatMessages.scrollHeight;
}

document.querySelectorAll('.delete-history-btn').forEach((button, index) => {
button.addEventListener('click', async function(e) {
e.stopPropagation();
const item = chatHistory[index];
const displayQuestion = item.first_question || item.question || '这条记录';
if (!confirm(`确定要删除这条记录吗？\n${displayQuestion}`)) {
return;
}

try {
const response = await fetch(`${API_BASE_URL}/api/chat/history/${item.id}`, {
method: 'DELETE',
headers: getAuthHeaders()
});
const result = await response.json();

if (result.success) {
chatHistory.splice(index, 1);
renderHistory();
} else {
alert('删除失败：' + result.message);
}
} catch (error) {
alert('删除失败：网络错误');
}
});
});
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function renderInline(text) {
    // Markdown 图片 ![alt](url) - 支持 http/https、data:image 和相对路径
    text = text.replace(/!\[([^\]]*)\]\((https?:\/\/[^\s"'<>]+|data:image\/[a-zA-Z]+;base64,[^\s"'<>]+|\/[^\s"'<>]+)\)/g, function(match, alt, url) {
        // 相对路径补全为完整 URL
        if (url.startsWith('/') && !url.startsWith('//')) {
            url = API_BASE_URL + url;
        }
        return '<div class="image-container-wrapper"><div class="image-container"><img src="' + url + '" alt="' + alt + '" class="chart-image"></div><div class="image-controls"><button class="zoom-btn" onclick="zoomImage(this, 0.1)">+</button><button class="zoom-btn" onclick="zoomImage(this, -0.1)">-</button><button class="zoom-btn" onclick="resetZoom(this)">重置</button></div></div>';
    });
    // Markdown 链接 [text](url)
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s"'<>]+)\)/g, '<a href="$2" target="_blank" class="md-link">$1</a>');
    // 粗体 **text**
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // 斜体 *text*（在 ** 处理之后，简单的 * 匹配即可）
    text = text.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
    // 行内代码 `code`
    text = text.replace(/`([^`]+)`/g, '<code class="md-code">$1</code>');
    // 裸 URL 自动链接（跳过在引号或等号后面的URL）
    text = text.replace(/https?:\/\/[^\s"'<>]+/g, function(match, offset, string) {
        const prevChar = string[offset - 1];
        if (prevChar === '"' || prevChar === "'" || prevChar === '=') {
            return match;
        }
        return '<a href="' + match + '" target="_blank" class="md-link">' + match + '</a>';
    });
    return text;
}

function zoomImage(btn, delta) {
    const wrapper = btn.closest('.image-container-wrapper');
    const img = wrapper.querySelector('.chart-image');
    const currentWidth = parseFloat(img.style.width) || 100;
    let newWidth = currentWidth + (delta * 100);
    newWidth = Math.max(50, Math.min(500, newWidth));
    img.style.width = newWidth + '%';
}

function resetZoom(btn) {
    const wrapper = btn.closest('.image-container-wrapper');
    const img = wrapper.querySelector('.chart-image');
    img.style.width = '100%';
}

function renderMarkdown(text) {
    if (!text) return '';
    const lines = text.split('\n');
    let html = '';
    let tableLines = [];
    let inList = false;
    let listType = '';

    function flushTable() {
        if (tableLines.length >= 2) {
            // 判断分隔符：优先检测制表符，否则检测 Markdown 表格的 |
            const firstLine = tableLines[0];
            const isMarkdownTable = firstLine.includes('|') && !firstLine.includes('\t');
            let headers = [];
            let dataRows = [];
            if (isMarkdownTable) {
                // Markdown 表格：| 列1 | 列2 | 列3 |
                headers = firstLine.split('|').map(c => c.trim()).filter(c => c);
                // 第二行通常是分隔符 |---|---|，跳过
                let startIdx = 1;
                if (tableLines[1] && tableLines[1].replace(/[|\-\s]/g, '') === '') {
                    startIdx = 2;
                }
                for (let i = startIdx; i < tableLines.length; i++) {
                    const cells = tableLines[i].split('|').map(c => c.trim()).filter(c => c);
                    if (cells.length > 0) dataRows.push(cells);
                }
            } else {
                // 制表符分隔表格
                headers = firstLine.split('\t').map(c => c.trim()).filter(c => c);
                for (let i = 1; i < tableLines.length; i++) {
                    const cells = tableLines[i].split('\t').map(c => c.trim());
                    if (cells.length > 0) dataRows.push(cells);
                }
            }
            if (headers.length > 0 && dataRows.length > 0) {
                html += '<div class="table-wrapper"><table class="data-table"><thead><tr>';
                headers.forEach(cell => {
                    html += `<th>${escapeHtml(cell)}</th>`;
                });
                html += '</tr></thead><tbody>';
                dataRows.forEach(row => {
                    html += '<tr>';
                    row.forEach((cell, idx) => {
                        if (idx < headers.length) {
                            html += `<td>${escapeHtml(cell)}</td>`;
                        }
                    });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
            } else {
                // 表格数据不完整，按段落渲染
                tableLines.forEach(line => {
                    html += `<p class="md-p">${renderInline(line)}</p>`;
                });
            }
        } else if (tableLines.length === 1) {
            html += `<p class="md-p">${renderInline(tableLines[0])}</p>`;
        }
        tableLines = [];
    }

    function flushList() {
        if (inList) {
            html += `</${listType}>`;
            inList = false;
            listType = '';
        }
    }

    lines.forEach(line => {
        const trimmed = line.trim();
        // 检测表格行：制表符分隔 或 Markdown | 分隔
        const isTableLine = (line.includes('\t') || (line.includes('|') && trimmed.startsWith('|'))) && trimmed;

        if (isTableLine) {
            flushList();
            tableLines.push(line);
            return;
        }

        flushTable();

        if (trimmed === '') {
            flushList();
            return;
        }

        // 标题 # 到 ######
        const headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
        if (headingMatch) {
            flushList();
            const level = headingMatch[1].length;
            html += `<h${level} class="md-h${level}">${renderInline(headingMatch[2])}</h${level}>`;
            return;
        }

        // 分割线 --- 或 ***
        if (line.match(/^(---+|\*\*\*)$/)) {
            flushList();
            html += '<hr class="md-hr">';
            return;
        }

        // 无序列表
        const ulMatch = line.match(/^[\*\-]\s+(.*)$/);
        if (ulMatch) {
            if (!inList || listType !== 'ul') {
                flushList();
                html += '<ul class="md-ul">';
                inList = true;
                listType = 'ul';
            }
            html += `<li>${renderInline(ulMatch[1])}</li>`;
            return;
        }

        // 有序列表
        const olMatch = line.match(/^\d+\.\s+(.*)$/);
        if (olMatch) {
            if (!inList || listType !== 'ol') {
                flushList();
                html += '<ol class="md-ol">';
                inList = true;
                listType = 'ol';
            }
            html += `<li>${renderInline(olMatch[1])}</li>`;
            return;
        }

        // 普通段落
        flushList();
        html += `<p class="md-p">${renderInline(line)}</p>`;
    });

    flushTable();
    flushList();
    return html;
}

async function sendMessage(message, extraAttachments = []) {
hideWelcome();
let userAttachments = [];
if (selectedImage) {
    userAttachments = [{type: 'image', url: selectedImage.base64}];
}
userAttachments = userAttachments.concat(extraAttachments);

// 处理已选择的文件（Excel/CSV/TXT/JSON）
let finalMessage = message;
let fileContent = '';  // 新增：存储文件内容用于表格操作
if (selectedKnowledgeFile && selectedKnowledgeFile.file) {
    const file = selectedKnowledgeFile.file;
    const ext = file.name.split('.').pop().toLowerCase();
    
    if (['csv', 'txt', 'json', 'md', 'py'].includes(ext)) {
        try {
            const content = await file.text();
            finalMessage = `以下是文件「${file.name}」的内容：\n\n\`\`\`\n${content}\n\`\`\`\n\n---\n用户问题：${message}`;
            fileContent = content;  // 保存文件内容
        } catch (e) {
            console.error('读取文件失败:', e);
        }
    } else if (['xlsx', 'xls'].includes(ext)) {
        try {
            const formData = new FormData();
            formData.append('file', file);
            const headers = {};
            const token = Auth.getToken();
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            const resp = await fetch(`${API_BASE_URL}/api/file/parse`, {
                method: 'POST',
                headers: headers,
                body: formData
            });
            const parseResult = await resp.json();
            if (parseResult.success) {
                // 如果返回了 table_data 结构，转换为制表符分隔格式
                if (parseResult.data.table_data) {
                    const td = parseResult.data.table_data;
                    // 构建制表符分隔的文本
                    let content = td.headers.join('\t') + '\n';
                    td.rows.forEach(row => {
                        content += row.join('\t') + '\n';
                    });
                    finalMessage = `以下是Excel文件「${file.name}」的内容：\n\n\`\`\`\n${content}\`\`\`\n\n---\n用户问题：${message}`;
                    fileContent = content;
                } else {
                    finalMessage = `以下是Excel文件「${file.name}」的内容：\n\n\`\`\`\n${parseResult.data.content}\n\`\`\`\n\n---\n用户问题：${message}`;
                    fileContent = parseResult.data.content;
                }
            } else {
                alert('文件解析失败：' + parseResult.message);
                return;
            }
        } catch (e) {
            console.error('解析Excel失败:', e);
            alert('文件解析失败');
            return;
        }
    }
    
    // 清空文件选择状态
    selectedKnowledgeFile = null;
    messageInput.placeholder = '输入消息...';
    fileUploadBtn.classList.remove('text-blue-500');
}

addMessage(finalMessage, true, false, userAttachments);
addLoadingMessage();
messageInput.value = '';

try {
const response = await fetch(`${API_BASE_URL}/api/chat`, {
method: 'POST',
headers: getAuthHeaders(),
body: JSON.stringify({ 
    message: finalMessage,
    conversation_id: currentConversationId,
    history_messages: currentHistoryMessages,
    file_content: fileContent
})
});

const result = await response.json();
removeLoadingMessage();

if (result.success) {
const isHtml = result.data.is_html || false;
const assistantAttachments = result.data.attachments || [];
addMessage(result.data.reply, false, isHtml, assistantAttachments);

if (result.data.conversation_id) {
currentConversationId = result.data.conversation_id;
}

currentHistoryMessages.push({ role: 'user', content: finalMessage });
currentHistoryMessages.push({ role: 'assistant', content: result.data.reply });



saveToHistory(finalMessage, result.data.reply, userAttachments, assistantAttachments);
} else {
addMessage('抱歉，出现了错误：' + result.message, false);
}
} catch (error) {
removeLoadingMessage();
addMessage('抱歉，网络连接失败，请检查后端服务是否启动。', false);
}
}

function fileToBase64(file) {
return new Promise((resolve, reject) => {
const reader = new FileReader();
reader.onload = () => resolve(reader.result);
reader.onerror = error => reject(error);
reader.readAsDataURL(file);
});
}

function getRandomQuestions(count) {
const questions = [];
let attempts = 0;
while (questions.length < count && attempts < 100) {
const index = Math.floor(Math.random() * coalMineQuestions.length);
if (!usedIndices.includes(index)) {
questions.push(coalMineQuestions[index]);
usedIndices.push(index);
if (usedIndices.length > coalMineQuestions.length / 2) {
usedIndices = usedIndices.slice(Math.floor(usedIndices.length / 2));
}
}
attempts++;
}
return questions;
}

// 生成二维码
async function generateQRCode() {
    console.log('开始生成二维码...');
    const canvas = document.getElementById('qrCodeCanvas');
    const urlElement = document.getElementById('currentUrl');
    if (!canvas || !urlElement) {
        console.warn('canvas 或 urlElement 未找到');
        return;
    }
    let qrCodeUrl = null;
    try {
        const response = await fetch(`${API_BASE_URL}/api/qrcode/server-url`, {
            headers: getAuthHeaders()
        });
        const result = await response.json();
        console.log('获取服务器地址:', result);
        if (result.success) {
            if (result.connected && result.username) {
                showConnectedUser(result.username, result.user_id);
                return;
            }
            if (result.server_url && !result.server_url.includes('localhost') && !result.server_url.includes('127.0.0.1')) {
                qrCodeUrl = `${result.server_url}/mobile/connect`;
            }
        }
    } catch (error) {
        console.warn('获取服务器地址失败:', error);
    }
    if (!qrCodeUrl) {
        urlElement.textContent = '无法获取局域网IP，请确认后端正常运行';
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#EF4444';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('获取IP失败', canvas.width/2, canvas.height/2 - 6);
        ctx.fillText('请刷新重试', canvas.width/2, canvas.height/2 + 8);
        return;
    }
    urlElement.textContent = qrCodeUrl;
    console.log('生成二维码 URL:', qrCodeUrl);
    
    // 备用方案：如果 qrcode.js 未加载，使用 Google Charts API
    if (typeof QRCode === 'undefined' && typeof qrcode === 'undefined') {
        console.warn('qrcode.js 未加载，使用 Google Charts 备用方案');
        const img = document.getElementById('qrCodeImg');
        if (img) {
            img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=' + encodeURIComponent(qrCodeUrl);
            img.style.display = 'block';
            const canvas = document.getElementById('qrCodeCanvas');
            if (canvas) canvas.style.display = 'none';
        }
        return;
    }
    
    const QR = QRCode || qrcode;
    try {
        const dataUrl = await QR.toDataURL(qrCodeUrl, { width: 128, margin: 1, color: { dark: '#000000', light: '#ffffff' } });
        console.log('二维码 DataURL 生成成功');
        const img = document.getElementById('qrCodeImg');
        if (img) {
            img.src = dataUrl;
            img.style.display = 'block';
            const canvas = document.getElementById('qrCodeCanvas');
            if (canvas) canvas.style.display = 'none';
        }
    } catch (error) {
        console.error('二维码生成失败:', error);
        // 回退到 Google Charts
        const img = document.getElementById('qrCodeImg');
        if (img) {
            img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=' + encodeURIComponent(qrCodeUrl);
            img.style.display = 'block';
            const canvas = document.getElementById('qrCodeCanvas');
            if (canvas) canvas.style.display = 'none';
        }
    }
}

// 显示已连接用户
function showConnectedUser(username, userId) {

    const connectedUserInfo = document.getElementById('connectedUserInfo');
    const connectedUsername = document.getElementById('connectedUsername');

// 轮询连接状态（手机端发心跳，电脑端轮询检测）
let connectedUserId = null;
let statusPollInterval = null;

function startQRStatusPolling() {
    if (statusPollInterval) clearInterval(statusPollInterval);
    statusPollInterval = setInterval(async function() {
        try {
            const response = await fetch(`${API_BASE_URL}/api/qrcode/server-url`, {
                headers: getAuthHeaders()
            });
            const result = await response.json();
            if (result.success && result.connected && result.username) {
                showConnectedUser(result.username, result.user_id);
                connectedUserId = result.user_id;
            } else {
                // 连接已断开，恢复二维码显示
                if (connectedUserId) {
                    console.log('检测到连接断开');
                    document.getElementById('qrCodeArea').classList.remove('hidden');
                    document.getElementById('connectedUserInfo').classList.add('hidden');
                    connectedUserId = null;
                    generateQRCode();
                }
            }
        } catch (e) {
            console.warn('轮询状态失败:', e);
        }
    }, 1000); // 每1秒轮询一次
}

// 初始化拖放区域
function initDropZone() {
    const dropZone = document.getElementById('dropZoneEmpty');
    const cardsContainer = document.getElementById('cardsContainer');
    if (!dropZone) return;
    dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        dropZone.classList.add('border-blue-400', 'bg-blue-50');
    });
    dropZone.addEventListener('dragleave', function() {
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
    });
    dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
        // 优先处理文件拖拽
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            for (let i = 0; i < files.length; i++) {
                handleDroppedFile(files[i]);
            }
            return;
        }
        // 处理从聊天区拖拽的HTML内容（提取图片）
        const html = e.dataTransfer.getData('text/html');
        if (html && html.trim()) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const imgs = doc.querySelectorAll('img');
            let hasImage = false;
            imgs.forEach(function(img) {
                const src = img.src || img.getAttribute('src');
                if (src) {
                    hasImage = true;
                    const item = {
                        type: src.startsWith('data:') ? 'image' : 'image',
                        content: src,
                        fileName: img.alt || '图片'
                    };
                    droppedItems.push(item);
                    renderDropItem(item);
                }
            });
            // 同时提取纯文本
            const text = e.dataTransfer.getData('text/plain');
            if (text && text.trim()) {
                handleDroppedText(text.trim());
            } else if (!hasImage) {
                // 如果没有纯文本也没有图片，尝试使用HTML中的文本
                const textContent = doc.body.textContent || doc.body.innerText || '';
                if (textContent.trim()) {
                    handleDroppedText(textContent.trim());
                }
            }
            return;
        }
        // 处理从聊天区拖拽的纯文本
        const text = e.dataTransfer.getData('text/plain');
        if (text && text.trim()) {
            handleDroppedText(text.trim());
        }
    });
    dropZone.addEventListener('click', function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.onchange = function(e) {
            for (let i = 0; i < e.target.files.length; i++) {
                handleDroppedFile(e.target.files[i]);
            }
        };
        input.click();
    });
}

// 处理拖放的文件
function handleDroppedFile(file) {
    const dropZoneEmpty = document.getElementById('dropZoneEmpty');
    const cardsContainer = document.getElementById('cardsContainer');
    if (dropZoneEmpty) dropZoneEmpty.classList.add('hidden');
    if (cardsContainer) cardsContainer.classList.remove('hidden');
    const reader = new FileReader();
    reader.onload = function(e) {
        const item = {
            type: file.type.startsWith('image/') ? 'image' : 'text',
            content: e.target.result,
            fileName: file.name
        };
        droppedItems.push(item);
        renderDropItem(item);
    };
    if (file.type.startsWith('image/')) {
        reader.readAsDataURL(file);
    } else {
        reader.readAsText(file);
    }
}

function handleDroppedText(text) {
    const dropZoneEmpty = document.getElementById('dropZoneEmpty');
    const cardsContainer = document.getElementById('cardsContainer');
    if (dropZoneEmpty) dropZoneEmpty.classList.add('hidden');
    if (cardsContainer) cardsContainer.classList.remove('hidden');
    const preview = text.substring(0, 40) + (text.length > 40 ? '...' : '');
    const item = {
        type: 'text',
        content: text,
        fileName: '选中的文本 (' + text.length + '字)'
    };
    droppedItems.push(item);
    renderDropItem(item);
}

// 渲染拖放项
function escapeHtml(text) {
    if (!text) return '';
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function renderDropItem(item) {
    const cardsContainer = document.getElementById('cardsContainer');
    if (!cardsContainer) return;
    const div = document.createElement('div');
    div.className = 'bg-white border border-gray-200 rounded-lg p-3 flex items-center justify-between';
    const safeFileName = escapeHtml(item.fileName);
    if (item.type === 'image') {
        div.innerHTML = `<div class="flex items-center"><img src="${item.content}" class="w-8 h-8 rounded object-cover mr-2"><span class="text-sm text-gray-700 truncate">${safeFileName}</span></div><button class="delete-drop-item text-red-500 hover:text-red-600 ml-2"><i class="fas fa-times"></i></button>`;
    } else if (item.type === 'text') {
        const preview = escapeHtml(item.content.substring(0, 30) + (item.content.length > 30 ? '...' : ''));
        const safeContent = escapeHtml(item.content);
        div.innerHTML = `<div class="flex items-center"><i class="fas fa-font text-green-500 mr-2"></i><span class="text-sm text-gray-700 truncate" title="${safeContent}">${preview}</span></div><button class="delete-drop-item text-red-500 hover:text-red-600 ml-2"><i class="fas fa-times"></i></button>`;
    } else {
        div.innerHTML = `<div class="flex items-center"><i class="fas fa-file-text text-blue-500 mr-2"></i><span class="text-sm text-gray-700 truncate">${safeFileName}</span></div><button class="delete-drop-item text-red-500 hover:text-red-600 ml-2"><i class="fas fa-times"></i></button>`;
    }
    // 绑定删除事件（使用 addEventListener 而非内联 onclick，避免全局作用域问题）
    const btn = div.querySelector('.delete-drop-item');
    btn.addEventListener('click', function() {
        const index = Array.from(cardsContainer.children).indexOf(div);
        droppedItems.splice(index, 1);
        div.remove();
        if (droppedItems.length === 0) {
            document.getElementById('dropZoneEmpty').classList.remove('hidden');
            document.getElementById('cardsContainer').classList.add('hidden');
        }
    });
    cardsContainer.appendChild(div);
}

// 清空拖放区域
function clearDropZone() {
    droppedItems = [];
    const cardsContainer = document.getElementById('cardsContainer');
    const dropZoneEmpty = document.getElementById('dropZoneEmpty');
    if (cardsContainer) { cardsContainer.innerHTML = ''; cardsContainer.classList.add('hidden'); }
    if (dropZoneEmpty) dropZoneEmpty.classList.remove('hidden');
}

// 设置发送按钮
function setupSendButton() {
    const sendBtn = document.getElementById('sendRightBtn');
    if (!sendBtn) return;
    sendBtn.addEventListener('click', async function() {
        if (droppedItems.length === 0) {
            alert('请先拖拽内容到右侧区域');
            return;
        }
        const selectedFormats = Array.from(document.querySelectorAll('input[name="outputFormat"]:checked')).map(input => input.value);
        const format = selectedFormats.includes('document') ? 'document' : 'formatted';
        // 分离文字和图片（包括被误判为文字的图片内容）
        const texts = [];
        const images = [];
        droppedItems.forEach(function(item) {
            if (item.type === 'image') {
                const mimePart = item.content.startsWith('data:image/') ? item.content.split('/')[1].split(';')[0].toUpperCase() : 'UNKNOWN';
                images.push({ filename: item.fileName, size: '未知', format: mimePart, base64: item.content });
            } else if (item.type === 'text') {
                // 检测文字内容是否实际是图片
                if (item.content.startsWith('data:image/')) {
                    const mimePart = item.content.split('/')[1].split(';')[0].toUpperCase();
                    images.push({ filename: item.fileName, size: '未知', format: mimePart, base64: item.content });
                } else if (/^https?:\/\/[^\s<>]+\.(?:png|jpg|jpeg|gif|webp)(\?.*)?$/i.test(item.content.trim())) {
                    images.push({ filename: item.fileName, size: '未知', format: 'URL', url: item.content });
                } else {
                    texts.push(item.content);
                }
            }
        });
        const sendData = { texts: texts, images: images, format: format };
        try {
            const response = await fetch(`${API_BASE_URL}/api/phone/send`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(sendData)
            });
            const result = await response.json();
            if (result.success) {
                alert(`✓ 内容已发送\n文字: ${result.text_count || texts.length} 条\n图片: ${result.image_count || images.length} 张`);
            } else {
                alert(`✗ 发送失败: ${result.message}`);
            }
        } catch (error) {
            alert('发送失败，请检查网络连接');
        }
        clearDropZone();
    });
}

// ========== 扫码上传弹窗功能 ==========
let qrUploadPollInterval = null;
let qrUploadOpenedAt = 0;

function openQRUploadModal() {
    const modal = document.getElementById('qrUploadModal');
    if (modal) modal.classList.remove('hidden');
    qrUploadOpenedAt = Date.now();
    generateQRUploadCode();
    startQRUploadPolling();
}

function closeQRUploadModal() {
    const modal = document.getElementById('qrUploadModal');
    if (modal) modal.classList.add('hidden');
    if (qrUploadPollInterval) clearInterval(qrUploadPollInterval);
    document.getElementById('qrUploadStatus').classList.add('hidden');
}

async function generateQRUploadCode() {
    const canvas = document.getElementById('qrUploadCanvas');
    const img = document.getElementById('qrUploadImg');
    const urlElement = document.getElementById('qrUploadUrl');
    if (!canvas || !urlElement) return;
    
    let uploadUrl = null;
    try {
        const response = await fetch(`${API_BASE_URL}/api/qrcode/server-url`, {
            headers: getAuthHeaders()
        });
        const result = await response.json();
        if (result.success && result.server_url) {
            uploadUrl = `${result.server_url}/mobile/upload`;
        }
    } catch (error) {
        console.warn('获取服务器地址失败:', error);
    }
    
    if (!uploadUrl) {
        urlElement.textContent = '无法获取服务器地址';
        return;
    }
    
    urlElement.textContent = uploadUrl;
    
    if (typeof QRCode === 'undefined' && typeof qrcode === 'undefined') {
        if (img) {
            img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=' + encodeURIComponent(uploadUrl);
            img.style.display = 'block';
            canvas.style.display = 'none';
        }
        return;
    }
    
    const QR = QRCode || qrcode;
    try {
        const dataUrl = await QR.toDataURL(uploadUrl, { width: 180, margin: 1 });
        if (img) {
            img.src = dataUrl;
            img.style.display = 'block';
            canvas.style.display = 'none';
        }
    } catch (error) {
        if (img) {
            img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=' + encodeURIComponent(uploadUrl);
            img.style.display = 'block';
            canvas.style.display = 'none';
        }
    }
}

function startQRUploadPolling() {
    if (qrUploadPollInterval) clearInterval(qrUploadPollInterval);
    qrUploadPollInterval = setInterval(async function() {
        try {
            const since = Math.floor(qrUploadOpenedAt / 1000);
            const response = await fetch(`${API_BASE_URL}/api/upload/status?since=${since}`, {
                headers: getAuthHeaders()
            });
            const result = await response.json();
            if (result.success && result.has_new) {
                document.getElementById('qrUploadStatus').classList.remove('hidden');
                document.getElementById('qrUploadStatusText').textContent = `已收到: ${result.filename || '新文件'}`;
                clearInterval(qrUploadPollInterval);
                
                // 获取文件内容并显示预览，等待用户输入问题后手动发送
                try {
                        const fileResp = await fetch(`${API_BASE_URL}/api/upload/latest`, {
                            headers: getAuthHeaders()
                        });
                        const fileResult = await fileResp.json();
                    if (fileResult.success) {
                        closeQRUploadModal();
                        hideWelcome();
                        if (fileResult.data.type === 'image') {
                            // 图片文件：显示预览，等待用户输入问题
                            const imgUrl = `${API_BASE_URL}${fileResult.data.url}`;
                            selectedImage = {
                                file: { name: fileResult.data.filename },
                                base64: imgUrl
                            };
                            previewImage.src = imgUrl;
                            imagePreview.classList.remove('hidden');
                            fileUploadBtn.classList.add('text-blue-500');
                            messageInput.placeholder = `已收到图片「${fileResult.data.filename}」，输入问题后发送...`;
                            messageInput.focus();
                        } else {
                            // 文本文件：将内容放入输入框，等待用户编辑后发送
                            const contentPreview = fileResult.data.content.substring(0, 500);
                            const truncated = fileResult.data.content.length > 500 ? '...（内容已截断）' : '';
                            messageInput.value = `以下是扫码上传的文件「${fileResult.data.filename}」的内容：\n\n${contentPreview}${truncated}\n\n请帮我分析这个文件。`;
                            messageInput.focus();
                        }
                    }
                } catch (e) {
                    console.error('获取文件内容失败:', e);
                }
            }
        } catch (e) {
            // 忽略轮询错误
        }
    }, 3000);
}

document.getElementById('closeQrUploadModal').addEventListener('click', closeQRUploadModal);
document.getElementById('qrUploadModal').addEventListener('click', function(e) {
    if (e.target === document.getElementById('qrUploadModal')) {
        closeQRUploadModal();
    }
});

// 断开连接按钮
document.getElementById('disconnectBtn').addEventListener('click', async function() {
    try {
        await fetch(`${API_BASE_URL}/api/qrcode/disconnect`, { 
            method: 'POST', 
            headers: getAuthHeaders()
        });
        // 清除轮询，避免立即重新检测到连接状态
        if (statusPollInterval) clearInterval(statusPollInterval);
        connectedUserId = null;
        document.getElementById('qrCodeArea').classList.remove('hidden');
        document.getElementById('connectedUserInfo').classList.add('hidden');
        // 延迟生成二维码，给后端时间处理断开请求
        setTimeout(generateQRCode, 500);
    } catch (e) {
        console.warn('断开连接失败:', e);
    }
});
});
